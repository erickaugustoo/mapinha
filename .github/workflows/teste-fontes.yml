name: teste-fontes

# Teste de fumaça: as fontes críticas do mapinha dependem de "parecer um usuário
# normal". Da máquina do Erick (IP residencial) elas passam; a dúvida é se
# passam do IP de datacenter do GitHub Actions. Este job responde isso com fato.
# Roda no push deste arquivo e commita o resultado em teste-fontes-resultado.md.

on:
  push:
    paths: ['.github/workflows/teste-fontes.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: instalar cloudscraper
        run: pip install --quiet cloudscraper

      - name: testar as fontes criticas
        run: |
          python - <<'PY' > teste-fontes-resultado.md
          import json, re, ssl, urllib.request, datetime

          UA = ('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 '
                '(KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36')
          CTX = ssl.create_default_context()
          CTX.check_hostname = False
          CTX.verify_mode = ssl.CERT_NONE
          linhas = ['# Teste das fontes a partir do GitHub Actions', '',
                    f'Rodado em {datetime.datetime.utcnow():%Y-%m-%d %H:%M} UTC',
                    '', '| fonte | via | resultado |', '|---|---|---|']

          def urllib_get(url):
              req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(req, timeout=40, context=CTX) as r:
                  return r.status, r.read(300000).decode('utf-8', 'replace')

          def cs_get(url):
              import cloudscraper
              s = cloudscraper.create_scraper(
                  browser={'browser': 'chrome', 'platform': 'windows', 'desktop': True})
              r = s.get(url, timeout=60)
              return r.status_code, r.text

          # (nome, url, funcao, marcador que prova que veio conteudo de verdade)
          testes = [
              ('leilaoimovel (Cloudflare)',
               'https://www.leilaoimovel.com.br/encontre-seu-imovel?cidade=3550308&venda=4,3,5,6,8&ordem=price_a',
               cs_get, r'/imovel/'),
              ('leilaobrasil (Cloudflare)',
               'https://www.leilaobrasil.com.br/buscador?page=1', cs_get, r'/lote/'),
              ('netoalencar (Wix/fingerprint)',
               'https://www.netoalencarimoveis.com.br/category/venda', cs_get,
               r'product-list-grid-item'),
              ('quintoandar (API)',
               'https://www.quintoandar.com.br/api/yellow-pages/v2/search?map[bounds_north]=-23.5'
               '&map[bounds_south]=-23.6&map[bounds_east]=-46.6&map[bounds_west]=-46.7'
               '&business_context=SALE&page_size=1&return=id', urllib_get, r'"id"'),
              ('prohabitar (Next.js)',
               'https://www.prohabitar.com.br/imoveis/a-venda/brasil?precovenda=0--1000000',
               urllib_get, r'__NEXT_DATA__'),
              ('nominatim (geocode)',
               'https://nominatim.openstreetmap.org/search?q=Avenida+Paulista,+Sao+Paulo'
               '&format=json&limit=1', urllib_get, r'"lat"'),
          ]
          for nome, url, fn, marcador in testes:
              try:
                  code, corpo = fn(url)
                  tem = bool(re.search(marcador, corpo))
                  challenge = 'Just a moment' in corpo
                  if challenge:
                      res = 'BLOQUEADO (challenge Cloudflare)'
                  elif code == 200 and tem:
                      res = f'OK ({len(corpo)//1024} KB, conteudo confirmado)'
                  elif code == 200:
                      res = f'HTTP 200 mas SEM o conteudo esperado ({len(corpo)//1024} KB)'
                  else:
                      res = f'HTTP {code}'
              except Exception as e:
                  res = f'FALHOU: {type(e).__name__} {str(e)[:70]}'
              linhas.append(f'| {nome} | {fn.__name__} | {res} |')
              print(f'{nome}: {res}', flush=True)
          print('\n'.join(linhas))
          PY
          cat teste-fontes-resultado.md

      - name: commitar o resultado
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add teste-fontes-resultado.md
          git commit -m "resultado do teste de fontes no Actions" || exit 0
          git push
